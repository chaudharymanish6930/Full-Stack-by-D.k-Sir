<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch api</title>
</head>
<body>
    <button id="loadBtn">Load Users</button>
    <ul id="List"></ul>
</body>

<script>
    const btn = document.querySelector("#loadBtn")

btn.addEventListener("click", loadUsers)

async function loadUsers(){

    const response = await fetch("https://jsonplaceholder.typicode.com/users")
    console.log(response)

    const data = await response.json()
    console.log(data)
    const listContainer = document.querySelector('#List')
    data.forEach((item)=>{
        const element = document.createElement('li');
        const feature1 = document.createElement('div');
        const feature2 = document.createElement('div');
        listContainer.appendChild(element);
        element.appendChild(feature1);
        element.appendChild(feature2);
        element.className = 'listItem';
        feature1.innerText = item.name;
        feature2.innerText = item.email;
        element.style.padding = ' 5px 10px';
        element.style,margin = '5px 0';
    })

}
</script>
</html>
